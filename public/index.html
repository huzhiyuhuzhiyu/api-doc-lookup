<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="referrer" content="no-referrer"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="icon" href="<%= BASE_URL %>favicon1.ico" >
  <link rel="stylesheet" href="<%= BASE_URL %>cdn/element-ui/2.15.5/theme-chalk/index.css">
  <title><%= webpackConfig.name %></title>
  <script src="<%= BASE_URL %>cdn/echarts/4.2.1/echarts.min.js"></script>
  <script src="<%= BASE_URL %>cdn/vue/2.5.2/vue.min.js"></script>
  <script src="<%= BASE_URL %>cdn/vue-router/3.1.1/vue-router.min.js"></script>
  <script src="<%= BASE_URL %>cdn/vuex/3.1.1/vuex.min.js" charset="utf-8"></script>
  <script src="<%= BASE_URL %>cdn/axios/1.0.0/axios.min.js" charset="utf-8"></script>
  <script src="<%= BASE_URL %>cdn/element-ui/2.15.5/index.js" charset="utf-8"></script>
</head>

<body>
  <div id="app"></div>
  <!-- built files will be auto injected -->

  <script>
      window.addEventListener('load',function(e){
          setTimeout(function(){
              var t = window.performance
              if(t){
                  var e = t.getEntriesByType('navigation')[0],r = 0
                  e || (r =(e = t.timing).navigationStart)
                  var n = [{
                      key:'Redirect',
                      desc:'\u7f51\u9875\u91cd\u5b9a\u5411\u7684\u8017\u65f6',
                      value: e.redirectEnd - e.redirectStart
                  },{
                      key:'AppCache',
                      desc:'\u68c0\u67e5\u672c\u5730\u7f13\u5b58\u7684\u8017\u65f6',
                      value: e.domainLookupStart - e.fetchStart
                  },{
                      key:'DNS',
                      desc:'DNS查询的耗时',
                      value:e.domainLookupEnd - e.domainLookupStart
                  },{
                      key:'TCP',
                      desc:'TCP连接的耗时',
                      value:e.connectEnd - e.connectStart
                  },{
                      key:'Waiting(TTFB)',
                      desc:'从客户端发起请求到接收到响应的时间 / Time To First Byte',
                      value: e.responseStart - e.requestStart
                  },{
                      key:'Content Download',
                      desc:'下载服务端返回数据的时间',
                      value: e.responseEnd - e.responseStart
                  },{
                      key:'HTTP Total Time',
                      desc:'http请求总耗时',
                      value:e.responseEnd - e.requestStart
                  },{
                      key:'DOMContentLoaded',
                      desc:'dom加载完成的时间',
                      value: e.domContentLoadedEventEnd - r
                  },{
                      key:'Load',
                      desc:'页面load总耗时',
                      value:e.loadEventEnd - r
                  }]
                  console && console.table && console.table(n)
              }
          },0)
      })
  </script>
</body>
