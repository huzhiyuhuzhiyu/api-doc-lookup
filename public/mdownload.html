<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0,user-scalable=no,minimal-ui"
    >
    <meta http-equiv="x-dns-prefetch-control" content="on">
    <link rel="icon" href="/favicon1.ico">
    <!-- <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" /> -->
    <title>轴管通</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden; /* 防止水平滚动 */
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #e0f7fa, #bbdefb); /* 渐变背景色，增加现代感 */
            color: #333;
            line-height: 1.5;
            position: relative;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 20px 30px; /* 增加底部内边距 */
            background-color: #fff;
            min-height: 100%;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.08); /* 加强阴影效果 */
            overflow-y: auto; /* 确保内容可滚动 */
            position: relative;
            padding-bottom: env(safe-area-inset-bottom, 30px); /* 适配全面屏手机底部安全区域 */
            padding-top: env(safe-area-inset-top, 20px); /* 适配全面屏手机顶部安全区域 */
        }

        .header {
            text-align: center;
            padding: 15px 0 20px; /* 调整头部内边距 */
            margin-top: 10px; /* 增加顶部边距 */
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 20px; /* 稍微增加圆角 */
            margin-bottom: 15px;
            box-shadow: 0 10px 25px rgba(32, 149, 243, 0.3), 0 6px 12px rgba(0, 0, 0, 0.1); /* 更现代的阴影效果 */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: pulse 2s infinite alternate; /* 添加轻微动画效果 */
        }

        @keyframes pulse {
            from {
                box-shadow: 0 10px 25px rgba(32, 149, 243, 0.2), 0 6px 12px rgba(0, 0, 0, 0.1);
                transform: translateY(0);
            }
            to {
                box-shadow: 0 15px 30px rgba(32, 149, 243, 0.4), 0 8px 15px rgba(0, 0, 0, 0.15);
                transform: translateY(-3px);
            }
        }

        .logo:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(32, 149, 243, 0.4), 0 8px 15px rgba(0, 0, 0, 0.15);
        }

        .app-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .app-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px; /* 减小底部边距 */
        }

        .screenshots {
            display: flex;
            overflow-x: auto;
            margin: 15px 0; /* 减小上下边距 */
            padding: 10px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* 隐藏Firefox滚动条 */
            -ms-overflow-style: none; /* 隐藏IE滚动条 */
        }

        .screenshots::-webkit-scrollbar {
            display: none; /* 隐藏WebKit滚动条 */
        }

        .screenshot {
            flex: 0 0 auto;
            width: 160px; /* 调整宽度 */
            height: 280px; /* 调整高度 */
            margin-right: 12px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .download-area {
            margin: 25px 0; /* 调整边距 */
        }

        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 52px;
            border-radius: 26px;
            margin-bottom: 15px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1); /* 添加按钮阴影 */
        }

        .android-btn {
            background: linear-gradient(45deg, #32c5ff, #2196f3); /* 调整渐变角度 */
        }

        .ios-btn {
            background: linear-gradient(45deg, #3a3a3a, #000000); /* 调整渐变角度 */
        }

        .download-btn:active {
            opacity: 0.8;
            transform: scale(0.98) translateY(2px); /* 加强按下效果 */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* 按下时减小阴影 */
        }

        .btn-icon {
            width: 24px;
            height: 24px;
            margin-right: 8px;
        }

        .footer {
            text-align: center;
            padding: 15px 0 20px; /* 调整脚部内边距 */
            font-size: 12px;
            color: #999;
        }

        .footer a {
            color: #666;
            text-decoration: none;
            margin: 0 5px;
        }

        /* 微信提示样式 */
        .wechat-tip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: #fff;
            text-align: center;
        }

        .wechat-tip-arrow {
            width: 60px;
            height: 60px;
            margin: 20px 0;
            position: absolute;
            top: env(safe-area-inset-top, 5px);
            right: 25px;
        }

        .wechat-tip-text {
            margin-top: 80px;
            padding: 15px;
            font-size: 18px;
            line-height: 1.6;
        }

        .wechat-tip-close {
            margin-top: 30px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 16px;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        /* 为iOS刘海屏添加安全区域 */
        @supports (padding-top: env(safe-area-inset-top)) {
            .container {
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(30px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // 防止页面弹跳
    document.documentElement.style.height = '100%';
    document.body.style.height = '100%';

    // 检测设备类型
    var isAndroid = /Android/i.test(navigator.userAgent);
    var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    // 获取下载按钮
    var androidBtn = document.getElementById('androidBtn');
    var iosBtn = document.getElementById('iosBtn');

    // 根据设备类型调整按钮顺序
    if (isIOS) {
      // 如果是iOS设备，将iOS按钮放在前面
      var downloadArea = document.querySelector('.download-area');
      downloadArea.insertBefore(iosBtn, androidBtn);
    }

    // 添加下载点击事件处理
    androidBtn.addEventListener('click', function(e) {
      if (!isAndroid) {
        // 提示用户是否继续下载
        if (!confirm('检测到您不是Android设备，是否继续下载Android版本？')) {
          e.preventDefault();
        }
      }
    });

    iosBtn.addEventListener('click', function(e) {
      if (!isIOS) {
        // 提示用户是否继续下载
        if (!confirm('检测到您不是iOS设备，是否继续访问App Store？')) {
          e.preventDefault();
        }
      }
    });

    // 检测是否在微信中打开
    function isWechat() {
      return /MicroMessenger/i.test(navigator.userAgent);
    }

    // 微信打开提示处理
    if (isWechat()) {
      var wechatTip = document.getElementById('wechatTip');
      wechatTip.style.display = 'flex';

      // 关闭提示
      document.getElementById('closeTip').addEventListener('click', function() {
        wechatTip.style.display = 'none';
      });
    }
  });
</script>
